name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      GITHUB_OWNER: Flux-Tasks
      GITHUB_REPO: Flux-Tasks
      RELEASE_CHANNEL: stable
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run lint

      - name: Resolve release channel
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $channel = if ($version -match "-(alpha|beta|rc)") { $Matches[1] } else { "stable" }
          "RELEASE_CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - run: npm run build:frontend
      - run: npm run build:electron
      - run: npx electron-builder --win --publish never

      - name: Prepare update assets
        shell: pwsh
        run: |
          Copy-Item "release/win-unpacked/resources/app.asar" "release/app.asar" -Force
          node scripts/generate-update-manifest.js "--channel=$env:RELEASE_CHANNEL"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}"
          $prerelease = if ($env:RELEASE_CHANNEL -eq "stable") { @() } else { @("--prerelease") }
          gh release view $tag --repo "$env:GITHUB_OWNER/$env:GITHUB_REPO" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo "$env:GITHUB_OWNER/$env:GITHUB_REPO" --title "Flux Tasks $tag" --generate-notes @prerelease
          }
          $assets = @(
            "release/app.asar",
            "release/Flux.Tasks.Setup.exe"
          )
          if ($env:RELEASE_CHANNEL -eq "stable") {
            $assets += "release/manifests/latest.yml"
            $assets += "release/manifests/latest.json"
            $assets += "release/manifests/latest-stable.json"
          } else {
            $assets += "release/manifests/latest-$env:RELEASE_CHANNEL.json"
          }
          gh release upload $tag @assets --repo "$env:GITHUB_OWNER/$env:GITHUB_REPO" --clobber